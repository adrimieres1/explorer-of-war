<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Explorer of War">
<meta name="description" content="Explora el mundo real como un videojuego. Descubre el mapa con tu GPS.">
<title>Explorer of War</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #4dff91;
  --green-dim: #1a5a30;
  --green-mid: #2a8a50;
  --bg: #0a0e14;
  --bg2: #0e1510;
  --border: #1a3a1a;
  --text: #c8f0c0;
  --text-dim: #5a9a5a;
  --text-muted: #3a6a3a;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  touch-action: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  width: 100vw;
}

/* HUD TOP */
#hud {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(10,14,20,0.97);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
  padding-top: max(10px, env(safe-area-inset-top));
}

#title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 2px;
  flex-shrink: 0;
}

.hud-stats {
  display: flex;
  gap: 10px;
  flex: 1;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.stat {
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

.stat-val {
  color: var(--green);
  font-weight: 700;
  font-size: 11px;
}

.gps-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.gps-dot.active { animation: pulse 1.5s infinite; }
.gps-dot.error { background: #ff4444; }

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.3; transform:scale(0.6); }
}

/* MAP */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
}

#player-marker {
  position: absolute;
  width: 20px;
  height: 20px;
  margin-left: -10px;
  margin-top: -10px;
  z-index: 60;
  pointer-events: none;
  display: none;
}

#player-dot {
  width: 10px; height: 10px;
  background: var(--green);
  border-radius: 50%;
  position: absolute;
  top: 5px; left: 5px;
  box-shadow: 0 0 8px var(--green);
}

#player-ring {
  width: 20px; height: 20px;
  border: 1.5px solid var(--green);
  border-radius: 50%;
  position: absolute;
  top: 0; left: 0;
  animation: sonar 2s infinite;
  opacity: 0;
}

@keyframes sonar {
  0% { transform:scale(0.4); opacity:0.9; }
  100% { transform:scale(3); opacity:0; }
}

#accuracy-ring {
  position: absolute;
  border: 1px solid rgba(77,255,145,0.25);
  border-radius: 50%;
  pointer-events: none;
  z-index: 55;
  display: none;
  transform: translate(-50%, -50%);
}

/* MAP CONTROLS */
#controls {
  position: absolute;
  right: 14px;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 50;
}

.ctrl-btn {
  width: 40px; height: 40px;
  background: rgba(10,20,10,0.92);
  border: 1px solid var(--green-dim);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  -webkit-user-select: none;
}
.ctrl-btn:active { background: rgba(77,255,145,0.2); }

/* COORD TAG */
#coord-tag {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 9px;
  color: var(--text-muted);
  background: rgba(0,0,0,0.7);
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  z-index: 50;
  pointer-events: none;
  letter-spacing: 0.5px;
}

/* STATUS BAR */
#status-bar {
  padding: 6px 14px;
  background: rgba(10,14,20,0.97);
  border-top: 1px solid var(--border);
  font-size: 9px;
  color: var(--text-muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
}

#status-msg { color: var(--text-dim); }

/* OVERLAY */
#start-overlay {
  position: absolute;
  inset: 0;
  background: rgba(5,10,5,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  gap: 18px;
  padding: 24px;
}

.overlay-title {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 4px;
  text-align: center;
  line-height: 1.3;
}

.overlay-sub {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  max-width: 280px;
  line-height: 1.8;
}

.btn-primary {
  padding: 14px 32px;
  background: transparent;
  border: 1.5px solid var(--green);
  color: var(--green);
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
  max-width: 260px;
  transition: background 0.2s;
}
.btn-primary:active { background: rgba(77,255,145,0.15); }

.btn-secondary {
  padding: 11px 24px;
  background: transparent;
  border: 1px solid var(--green-dim);
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
  max-width: 260px;
  transition: border-color 0.2s;
}
.btn-secondary:active { border-color: var(--green); color: var(--green); }

.saved-badge {
  font-size: 9px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 3px;
  display: none;
}

/* NOTIFICATION */
#notif {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,20,10,0.95);
  border: 1px solid var(--green-dim);
  color: var(--green);
  font-size: 10px;
  padding: 6px 16px;
  border-radius: 4px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
#notif.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="title">EXP. OF WAR</div>
    <div class="hud-stats">
      <div class="stat"><div class="gps-dot" id="gps-dot"></div><span class="stat-val" id="gps-status">---</span></div>
      <div class="stat">PTS <span class="stat-val" id="tile-count">0</span></div>
      <div class="stat">KM <span class="stat-val" id="dist-val">0</span></div>
      <div class="stat">% <span class="stat-val" id="pct-val">0.0000</span></div>
    </div>
  </div>

  <div id="map-container">
    <canvas id="base-map"></canvas>
    <canvas id="trail-canvas"></canvas>
    <canvas id="fog-canvas"></canvas>
    <div id="accuracy-ring"></div>
    <div id="player-marker">
      <div id="player-ring"></div>
      <div id="player-dot"></div>
    </div>
    <div id="coord-tag">LAT -- &nbsp; LON --</div>
    <div id="controls">
      <button class="ctrl-btn" id="zoom-in">+</button>
      <button class="ctrl-btn" id="zoom-out">−</button>
      <button class="ctrl-btn" id="center-btn" title="Centrar en mi posición">⊕</button>
    </div>
    <div id="notif"></div>

    <div id="start-overlay">
      <div class="overlay-title">EXPLORER<br>OF WAR</div>
      <div class="overlay-sub">Explora el mundo real como un videojuego. Cada lugar que visites iluminará el mapa y desvanecerá la niebla de guerra.</div>
      <div class="saved-badge" id="saved-badge">▶ progreso guardado detectado</div>
      <button class="btn-primary" id="start-btn">INICIAR GPS</button>
      <button class="btn-secondary" id="demo-btn">MODO DEMO</button>
    </div>
  </div>

  <div id="status-bar">
    <span>■</span>
    <span id="status-msg">Listo para explorar...</span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
